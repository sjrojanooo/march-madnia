services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.flutter
    ports:
      - "8080:8080"
      - "8181:8181"
    volumes:
      - ./app:/app
      - ./.dart_defines:/app/.dart_defines:ro
      - flutter_pub_cache:/root/.pub-cache
    stdin_open: true
    tty: true
    profiles:
      - web
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./api:/app/api:ro
      - ./src:/app/src:ro
      - ./data:/app/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  flutter_pub_cache:
